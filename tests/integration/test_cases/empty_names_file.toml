[command]
args = ["--file", "empty.nix", '""', 'foo."".bar']

[repo_contents]

[[repo_contents.commits]]
message = "commit 1"
files."empty.nix" = """
let
  drv = import ./drv.nix;
in
{
  "" = drv "empty";
  foo."".bar = drv "foobar";
}
"""

[[repo_contents.commits]]
message = "commit 2"
files."empty.nix" = """
let
  drv = import ./drv.nix;
in
{
