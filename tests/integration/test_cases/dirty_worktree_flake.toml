[command]
args = []

[repo_contents]

[[repo_contents.commits]]
message = "commit 1"
files."flake.nix" = """
{
  outputs =
    inputs:
    let
      drv = import ./drv.nix;
    in
    {
      packages.@SYSTEM@ = {
        pkg1 = drv "pkg1-1";
        pkg2 = drv "pkg2";
      };
    };
}
"""

[repo_contents.index]
files."flake.nix" = """
{
  outputs =
    inputs:
    let
      drv = import ./drv.nix;
    in
    {
      packages.@SYSTEM@ = {
        pkg1 = drv "pkg1-2";
        pkg2 = drv "pkg2";
      };
    };
}
"""

[outputs]
exit_code = 1
stdout = """
