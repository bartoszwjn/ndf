[command]
args = ["--file", ".", "--from", "HEAD~"]

[repo_contents.git]

[[repo_contents.git.commits]]
message = "commit 1"
changes."default.nix".write = """
let
  drv = import ./drv.nix;
in
{
  pkg1 = drv "pkg1-1";
}
"""

[[repo_contents.git.commits]]
message = "commit 2"
changes."default.nix".write = """
let
  drv = import ./drv.nix;
in
{
  pkg1 = drv "pkg1-2";
}
"""

[[repo_contents.git.commits]]
message = "commit 3"
changes."default.nix".write = """
let
  drv = import ./drv.nix;
in
{
  pkg1 = drv "pkg1-3";
}
"""

[outputs]
exit_code = 1
stdout = """
File:  @REPO@/default.nix
Repo:  @REPO@
From:  @COMMIT_2_SHORT_ID@ commit 2
To:    [working tree]
Attribute paths:
  pkg1

Summary:
  pkg1 /nix/store/n0gwm7slqj7f7czywhvkv5aih4ykbfnm-pkg1-2.drv
  !=   /nix/store/j4vxji10npq2ldw1iax735469w0i5b0m-pkg1-3.drv
"""
stderr = ""
