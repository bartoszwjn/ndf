[command]
args = []

[repo_contents.git]

[[repo_contents.git.commits]]
message = "commit 1"
changes."flake.nix".write = """
{
  outputs =
    inputs:
    let
      drv = import ./drv.nix;
    in
    {
      packages.@SYSTEM@ = {
        normal = drv "normal";
        "with whitespace" = drv "whitespace";
        "with.dots.tld" = drv "dots";
        "with\\"quotes\\"" = drv "quotes";
      };
    };
}
"""

[outputs]
exit_code = 0
stdout = """
Flake: @REPO@
Repo:  @REPO@
From:  @COMMIT_1_SHORT_ID@ (HEAD -> main) commit 1
To:    [working tree]
Attribute paths:
  normal
  "with whitespace"
  "with"quotes""
  "with.dots.tld"

Summary:
  normal /nix/store/mkm5mf5kbiy1b1pm7nib559wbfm71dgl-normal.drv
  ==     /nix/store/mkm5mf5kbiy1b1pm7nib559wbfm71dgl-normal.drv

  "with whitespace" /nix/store/l876zpacfdqp2dfm5jg29c9sgnlili4j-whitespace.drv
  ==                /nix/store/l876zpacfdqp2dfm5jg29c9sgnlili4j-whitespace.drv

  "with"quotes"" /nix/store/z00m35ghhzblf2d6w8al1yw13yaqzi2p-quotes.drv
  ==             /nix/store/z00m35ghhzblf2d6w8al1yw13yaqzi2p-quotes.drv

  "with.dots.tld" /nix/store/jcskvri420cy0hxqxj817kr9zbv69axj-dots.drv
  ==              /nix/store/jcskvri420cy0hxqxj817kr9zbv69axj-dots.drv
"""
stderr = ""
