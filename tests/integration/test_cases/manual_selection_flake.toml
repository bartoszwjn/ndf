[command]
args = ["pkg2.tests.foo", "pkg1", ".top-level.pkg3"]

[repo_contents]

[[repo_contents.commits]]
message = "commit 1"
files."flake.nix" = """
{
  outputs =
    inputs:
    let
      drv = import ./drv.nix;
    in
    {
      packages.@SYSTEM@ = {
        pkg1 = drv "pkg1";
        pkg2 = (drv "pkg2") // {
          tests.foo = drv "pkg2-foo";
        };
      };
      top-level.pkg3 = drv "pkg3";
    };
}
"""

[[repo_contents.commits]]
message = "commit 2"
files."flake.nix" = """
{
  outputs =
    inputs:
    let
      drv = import ./drv.nix;
    in
    {
      packages.@SYSTEM@ = {
        pkg1 = drv "pkg1";
        pkg2 = (drv "pkg2") // {
          tests.foo = drv "pkg2-foo";
        };
      };
      top-level.pkg3 = drv "pkg3";
    };
}
"""

[outputs]
exit_code = 0
stdout = """
Flake: @REPO@
Repo:  @REPO@
From:  @COMMIT_1_SHORT_ID@ commit 1
To:    @COMMIT_2_SHORT_ID@ (HEAD -> main) commit 2
Tool:  none
Attribute paths:
  pkg2.tests.foo
  pkg1
  .top-level.pkg3

Summary:
  pkg2.tests.foo /nix/store/6az93kq09m6pfcbnp2g0qf58d9n2c6mj-pkg2-foo.drv
  ==             /nix/store/6az93kq09m6pfcbnp2g0qf58d9n2c6mj-pkg2-foo.drv

  pkg1 /nix/store/isn04dmf5r96lnv0jg1gd29cnbb5n1v6-pkg1.drv
  ==   /nix/store/isn04dmf5r96lnv0jg1gd29cnbb5n1v6-pkg1.drv

  .top-level.pkg3 /nix/store/dsr96x45rykd8pa5bq8wyd7n6f7gidr8-pkg3.drv
  ==              /nix/store/dsr96x45rykd8pa5bq8wyd7n6f7gidr8-pkg3.drv
"""
stderr = ""
