[command]
args = ["--file", ".", "--revision", "[working tree]"]

[repo_contents.jj]

[[repo_contents.jj.commits]]
message = "commit 1"
changes."default.nix".write = """
let
  drv = import ./drv.nix;
in
{
  pkg1 = drv "pkg1-1";
}
"""

[[repo_contents.jj.commits]]
message = "commit 2"
changes."default.nix".write = """
let
  drv = import ./drv.nix;
in
{
  pkg1 = drv "pkg1-2";
}
"""

[[repo_contents.jj.commits]]
message = "commit 3"
changes."default.nix".write = """
let
  drv = import ./drv.nix;
in
{
  pkg1 = drv "pkg1-3";
}
"""

[outputs]
exit_code = 2
stdout = ""
stderr = """
error:
   0: failed to resolve commit '--revision': "[working tree]"
   1: "[working tree]" is not a valid Jujutsu revset

Note: The Jujutsu equivalent of Git's working tree is the working copy commit (`@`). Use '--git' to switch to Git mode.
"""
