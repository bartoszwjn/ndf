[command]
args = ["pkg1", "pkg2", "pkg3", "pkg4"]

[repo_contents.git]

[[repo_contents.git.commits]]
message = "commit 1"
changes."flake.nix".write = """
{
  outputs =
    inputs:
    let
      drv = import ./drv.nix;
    in
    {
      packages.@SYSTEM@ = {
        pkg1 = drv "pkg1-1";
        pkg2 = drv "pkg2";
      };
    };
}
"""

[repo_contents.git.index]
changes."flake.nix".write = """
{
  outputs =
    inputs:
    let
      drv = import ./drv.nix;
    in
    {
      packages.@SYSTEM@ = {
        pkg1 = drv "pkg1-2";
        pkg3 = drv "pkg3";
      };
    };
}
"""

[outputs]
exit_code = 2
stdout = """
Flake: @REPO@
Repo:  @REPO@
From:  @COMMIT_1_SHORT_ID@ (HEAD -> main) commit 1
To:    [working tree]
Attribute paths:
  pkg1
  pkg2
  pkg3
  pkg4

Summary:
  pkg1 /nix/store/00pynf3avblabfjj19307dsdwspn5rjm-pkg1-1.drv
  !=   /nix/store/n0gwm7slqj7f7czywhvkv5aih4ykbfnm-pkg1-2.drv

  pkg2 /nix/store/3rg5f2382wvnyh8cj299c6jr98bsj7jx-pkg2.drv
  !=   missing

  pkg3 missing
  !=   /nix/store/dsr96x45rykd8pa5bq8wyd7n6f7gidr8-pkg3.drv

  pkg4 missing
  ??   missing
"""
stderr = ""
