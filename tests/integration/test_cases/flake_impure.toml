[command]
args = ["--to=@", "--impure"]
env.NDF_TESTS_NIX_PKG_NAME = "from-env"

[repo_contents]

[[repo_contents.commits]]
message = "commit 1"
files."flake.nix" = """
{
  outputs =
    inputs:
    let
      drv = import ./drv.nix;
      pkgName = "pkg-${builtins.getEnv "NDF_TESTS_NIX_PKG_NAME"}";
    in
    {
      packages.@SYSTEM@ = {
        ${pkgName} = drv pkgName;
      };
    };
}
"""

[outputs]
exit_code = 0
stdout = """
Flake: @REPO@ (impure)
Repo:  @REPO@
From:  @COMMIT_1_SHORT_ID@ (HEAD -> main) commit 1
To:    @COMMIT_1_SHORT_ID@ (HEAD -> main) commit 1
Attribute paths:
  pkg-from-env

Summary:
  pkg-from-env /nix/store/knw4pgh953fbgmjsb7vwcrzsqlbigll8-pkg-from-env.drv
  ==           /nix/store/knw4pgh953fbgmjsb7vwcrzsqlbigll8-pkg-from-env.drv
"""
stderr = ""
