[command]
args = ["", "."]

[repo_contents.git]

[[repo_contents.git.commits]]
message = "commit 1"
changes."flake.nix".write = """
{
  outputs =
    inputs:
    let
      drv = import ./drv.nix;
    in
    drv "root" // {
      packages.@SYSTEM@ = drv "pkgs-root";
    };
}
"""

[outputs]
exit_code = 0
stdout = """
Flake: @REPO@
Repo:  @REPO@
From:  @COMMIT_1_SHORT_ID@ (HEAD -> main) commit 1
To:    [working tree]
Attribute paths:
  (empty)
  .

Summary:
  (empty) /nix/store/36z8c09jz0wr3zxf01c6rw4zw2hj5z11-pkgs-root.drv
  ==      /nix/store/36z8c09jz0wr3zxf01c6rw4zw2hj5z11-pkgs-root.drv

  .  /nix/store/hbrfjhy8ixgkp5hq6k0q0gf2x7qah1sv-root.drv
  == /nix/store/hbrfjhy8ixgkp5hq6k0q0gf2x7qah1sv-root.drv
"""
stderr = ""
