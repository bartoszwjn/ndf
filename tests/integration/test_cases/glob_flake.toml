[command]
args = [
  "--glob",
  "literal.abcd",
  'quoted."abc.*?[xyz]"',
  "star.a*b*c",
  "questionMark.a?b?c",
  "bracketExpr.a[xyz]b[j-p]c",
  "bracketExprNegation.a[^a-i]b[!a-i]c",
  'bracketExprSpecialChars.a[]."*?[-]b',
  "bracketExprSpecialSeqs.a[[:digit:][.x.][=y=]]b",
]

[repo_contents.git]

[[repo_contents.git.commits]]
message = "commit 1"
changes."flake.nix".write = '''
{
  outputs =
    inputs:
    let
      drv = import ./drv.nix;
    in
    {
      packages.@SYSTEM@ = {
        # pattern: abcd
        literal = {
          # matched
          abcd = drv "literal-1";
          # ignored
          abc = drv "ignored";
          abcde = drv "ignored";
          Abcd = drv "ignored";
        };

        # pattern: "abc.*?[xyz]"
        quoted = {
          # matched
          "abc.*?[xyz]" = drv "quoted-1";
          # ignored
          abc.ghix = drv "ignored";
          abc."*?[xyz]" = drv "ignored";
          "abc.ghix" = drv "ignored";
        };

        # pattern: a*b*c
        star = {
          # matched
          abc = drv "star-1";
          axbyc = drv "star-2";
          axbyzc = drv "star-3";
          # ignored
          ac = drv "ignored";
          acb = drv "ignored";
          aBc = drv "ignored";
        };

        # pattern: a?b?c
        questionMark = {
          # matched
          axbyc = drv "question-mark-1";
          # ignored
          abc = drv "ignored";
          axbc = drv "ignored";
          axbyzc = drv "ignored";
        };

        # pattern: a[xyz]b[j-p]c
        bracketExpr = {
          # matched
          axbjc = drv "bracket-expr-1";
          aybnc = drv "bracket-expr-2";
          azbpc = drv "bracket-expr-3";
          # ignored
          aabjc = drv "ignored";
          axbac = drv "ignored";
          abc = drv "ignored";
          axybjc = drv "ignored";
          axbjkc = drv "ignored";
        };

        # pattern: a[^a-i]b[!a-i]c
        bracketExprNegation = {
          # matched
          ajbjc = drv "bracket-expr-negation-1";
          axbyc = drv "bracket-expr-negation-2";
          # ignored
          aabac = drv "ignored";
          adbyc = drv "ignored";
          axbic = drv "ignored";
        };

        # pattern: a[]."*?[-]b
        bracketExprSpecialChars = {
          # matched
          "a]b" = drv "bracket-expr-special-chars-7";
          "a.b" = drv "bracket-expr-special-chars-4";
          "a\"b" = drv "bracket-expr-special-chars-1";
          "a*b" = drv "bracket-expr-special-chars-2";
          "a?b" = drv "bracket-expr-special-chars-5";
          "a[b" = drv "bracket-expr-special-chars-6";
          "a-b" = drv "bracket-expr-special-chars-3";
          # ignored
          aab = drv "ignored";
          a9b = drv "ignored";
        };

        # pattern: a[[:digit:][.x.][=y=]]b
        bracketExprSpecialSeqs = {
          # matched
          a0b = drv "bracket-expr-special-seqs-1";
          a9b = drv "bracket-expr-special-seqs-2";
          aYb = drv "bracket-expr-special-seqs-3";
          axb = drv "bracket-expr-special-seqs-4";
          ayb = drv "bracket-expr-special-seqs-5";
          # ignored
          aXb = drv "ignored";
          azb = drv "ignored";
        };
      };
    };
}
'''

[outputs]
exit_code = 0
