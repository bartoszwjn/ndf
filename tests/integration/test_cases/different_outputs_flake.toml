message = "commit 1"
files."flake.nix" = """
{
  outputs =
    inputs:
    let
      drv = import ./drv.nix;
    in
    {
      packages.@SYSTEM@ = {
        pkg1 = drv "pkg1-1";
        pkg2 = drv "pkg2";
      };
    };
}
"""

