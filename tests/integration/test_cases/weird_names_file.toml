[command]
# run sequentially, so that the order of logs is deterministic
args = ["--file", "weird.nix", "-j", "1"]

[repo_contents]

[[repo_contents.commits]]
message = "commit 1"
files."weird.nix" = """
let
  drv = import ./drv.nix;
in
{
  normal = drv "normal";
  "with whitespace" = drv "whitespace";
  "with.dots.tld" = drv "dots";
  "with\\"quotes\\"" = drv "quotes";
}
"""

[[repo_contents.commits]]
message = "commit 2"
files."weird.nix" = """
let
  drv = import ./drv.nix;
in
{
  normal = drv "normal";
  "with whitespace" = drv "whitespace";
  "with.dots.tld" = drv "dots";
  "with\\"quotes\\"" = drv "quotes";
}
"""

[outputs]
exit_code = 2
stdout = """
File:  @REPO@/weird.nix
