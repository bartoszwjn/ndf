[command]
args = ["--file", "fn.nix"]

[repo_contents]

[[repo_contents.commits]]
message = "commit 1"
files."fn.nix" = """
{ version ? "1" }:
let
  drv = import ./drv.nix;
in
{
  pkg1 = drv "pkg1-${version}";
  pkg2 = drv "pkg2";
}
"""

[[repo_contents.commits]]
message = "commit 2"
files."fn.nix" = """
{ version ? "2" }:
let
  drv = import ./drv.nix;
in
{
  pkg1 = drv "pkg1-${version}";
  pkg2 = drv "pkg2";
}
"""

[outputs]
exit_code = 1
stdout = """
File:  @REPO@/fn.nix
Repo:  @REPO@
From:  @COMMIT_1_SHORT_ID@ commit 1
To:    @COMMIT_2_SHORT_ID@ (HEAD -> main) commit 2
Tool:  none
Attribute paths:
  pkg1
  pkg2

Summary:
  pkg1 /nix/store/00pynf3avblabfjj19307dsdwspn5rjm-pkg1-1.drv
  !=   /nix/store/n0gwm7slqj7f7czywhvkv5aih4ykbfnm-pkg1-2.drv

  pkg2 /nix/store/3rg5f2382wvnyh8cj299c6jr98bsj7jx-pkg2.drv
  ==   /nix/store/3rg5f2382wvnyh8cj299c6jr98bsj7jx-pkg2.drv
"""
stderr = ""
