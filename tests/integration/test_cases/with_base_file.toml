[command]
args = ["--file", ".", "--base", "base"]

[repo_contents.git]

[[repo_contents.git.commits]]
message = "commit 1"
changes."default.nix".write = """
let
  drv = import ./drv.nix;
in
{
  base = drv "base";
  one = drv "one";
  other = drv "other";
}
"""

[outputs]
exit_code = 1
stdout = """
File:  @REPO@/default.nix
Repo:  @REPO@
From:  [working tree]
To:    [working tree]
Base:  base
Attribute paths:
  base
  one
  other

Summary:
     base /nix/store/47p9g28wzzc0ncnbdpwgqmcmh9nknx9g-base.drv
  == base /nix/store/47p9g28wzzc0ncnbdpwgqmcmh9nknx9g-base.drv

     base /nix/store/47p9g28wzzc0ncnbdpwgqmcmh9nknx9g-base.drv
  != one  /nix/store/4j3wi6w05px0nh7qc3ds6nhq9wfqmnwz-one.drv

     base  /nix/store/47p9g28wzzc0ncnbdpwgqmcmh9nknx9g-base.drv
  != other /nix/store/jgc40b3aj7cgrai4cka7w5ry5z3bdfk3-other.drv
"""
stderr = ""
