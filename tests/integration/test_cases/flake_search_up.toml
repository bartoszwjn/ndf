[command]
args = []
current_dir = "in/a/subdir"

[repo_contents.git]

[[repo_contents.git.commits]]
message = "commit 1"
changes."in/a/subdir/.gitkeep".write = ""
changes."flake.nix".write = """
{
  outputs =
    inputs:
    let
      drv = import ./drv.nix;
    in
    {
      packages.@SYSTEM@ = {
        pkg1 = drv "pkg1";
        pkg2 = drv "pkg2";
      };
    };
}
"""

[outputs]
exit_code = 0
stdout = """
Flake: @REPO@
Repo:  @REPO@
From:  @COMMIT_1_SHORT_ID@ (HEAD -> main) commit 1
To:    [working tree]
Attribute paths:
  pkg1
  pkg2

Summary:
  pkg1 /nix/store/isn04dmf5r96lnv0jg1gd29cnbb5n1v6-pkg1.drv
  ==   /nix/store/isn04dmf5r96lnv0jg1gd29cnbb5n1v6-pkg1.drv

  pkg2 /nix/store/3rg5f2382wvnyh8cj299c6jr98bsj7jx-pkg2.drv
  ==   /nix/store/3rg5f2382wvnyh8cj299c6jr98bsj7jx-pkg2.drv
"""
stderr = ""
