[command]
args = ["--nixos"]

[repo_contents.git]

[[repo_contents.git.commits]]
message = "commit 1"
changes."flake.nix".write = """
{
  outputs =
    inputs:
    let
      drv = import ./drv.nix;
      nixos = name: { config.system.build.toplevel = drv name; };
    in
    {
      nixosConfigurations = {
        nixos1 = nixos "nixos1-1";
        nixos2 = nixos "nixos2";
      };
    };
}
"""

[repo_contents.git.index]
changes."flake.nix".write = """
{
  outputs =
    inputs:
    let
      drv = import ./drv.nix;
      nixos = name: { config.system.build.toplevel = drv name; };
    in
    {
      nixosConfigurations = {
        nixos1 = nixos "nixos1-2";
        nixos2 = nixos "nixos2";
      };
    };
}
"""

[outputs]
exit_code = 1
stdout = """
Flake: @REPO@
Repo:  @REPO@
From:  @COMMIT_1_SHORT_ID@ (HEAD -> main) commit 1
To:    [working tree]
Attribute paths:
  nixos1 (NixOS)
  nixos2 (NixOS)

Summary:
  nixos1 (NixOS) /nix/store/j54xzm2nfh4ighlbdll5fqxmnjch1d0h-nixos1-1.drv
  !=             /nix/store/v7lw095ayml3r8z6ggwld1h1hqc1h680-nixos1-2.drv

  nixos2 (NixOS) /nix/store/5kid5r6mn6d1pqkpxv73mjmglhk0a736-nixos2.drv
  ==             /nix/store/5kid5r6mn6d1pqkpxv73mjmglhk0a736-nixos2.drv
"""
stderr = ""
