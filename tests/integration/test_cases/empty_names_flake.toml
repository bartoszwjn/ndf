# Both CppNix (2.34.7) and Lix (2.95.2) technically allow empty attribute names in flake outputs,
# but the attribute paths are sometimes parsed differently between implementations.
[command]
args = ['""', 'foo."".bar']

[repo_contents.git]

[[repo_contents.git.commits]]
message = "commit 1"
changes."flake.nix".write = """
{
  outputs =
    inputs:
    let
      drv = import ./drv.nix;
    in
    {
      packages.@SYSTEM@ = {
        "" = drv "empty";
        foo."".bar = drv "foobar";
      };
    };
}
"""

[outputs]
exit_code = 0
stdout = """
Flake: @REPO@
Repo:  @REPO@
From:  @COMMIT_1_SHORT_ID@ (HEAD -> main) commit 1
To:    [working tree]
Attribute paths:
  ""
  foo."".bar

Summary:
  "" /nix/store/dxx3wb5c4wggz0dnirncm83qzhmsc3vg-empty.drv
  == /nix/store/dxx3wb5c4wggz0dnirncm83qzhmsc3vg-empty.drv

  foo."".bar /nix/store/6kpmixa64q8ivx4zzm7z4fcjn021fpj2-foobar.drv
  ==         /nix/store/6kpmixa64q8ivx4zzm7z4fcjn021fpj2-foobar.drv
"""
stderr = ""
