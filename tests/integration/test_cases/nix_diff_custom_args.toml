[command]
args = [
  "--file=.",
  "--tool=nix-diff",
  "--tool-extra-args",
  "--skip-already-compared",
  "--word-oriented",
]

[repo_contents]

[[repo_contents.commits]]
message = "commit 1"
files."default.nix" = """
let
  drv = import ./drv.nix;
in
{
  pkg1 = drv "pkg1-1";
}
"""

[repo_contents.index]
files."default.nix" = """
let
  drv = import ./drv.nix;
in
{
  pkg1 = drv "pkg1-2";
}
"""

[outputs]
exit_code = 1
stdout = """
File:  @REPO@/default.nix
Repo:  @REPO@
From:  @COMMIT_1_SHORT_ID@ (HEAD -> main) commit 1
To:    [working tree]
Tool:  nix-diff --skip-already-compared --word-oriented
Attribute paths:
  pkg1

- pkg1 @COMMIT_1_SHORT_ID@ (HEAD -> main) commit 1
+ pkg1 [working tree]
- /nix/store/00pynf3avblabfjj19307dsdwspn5rjm-pkg1-1.drv:{out}
+ /nix/store/n0gwm7slqj7f7czywhvkv5aih4ykbfnm-pkg1-2.drv:{out}
• The environments do not match:
    name=←pkg1-1←→pkg1-2→

Summary:
  pkg1 /nix/store/00pynf3avblabfjj19307dsdwspn5rjm-pkg1-1.drv
  !=   /nix/store/n0gwm7slqj7f7czywhvkv5aih4ykbfnm-pkg1-2.drv
"""
stderr = ""
